<!DOCTYPE html>
<html lang="en">
<head>

<title>Free English Text to Speech</title>

<style>
body { margin:0; font-family: Arial; background:#0d1117; color:white; }
.ad-banner, .ad-bottom { text-align:center; padding:10px; }

<body>

<header style="padding:20px;border-bottom:1px solid #333;">

<!-- TOP AD -->
<div class="ad-banner">

</div>

<main class="layout">

  <div>
    <h1>Text to Speech</h1>
    <textarea style="width:100%;height:150px;">Hello world example text</textarea>
  </div>

  <!-- SIDEBAR AD -->
  <div class="ad-sidebar">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-7086938365759492"
         data-ad-slot="2222222222"

</main>

<!-- BOTTOM AD -->
<div class="ad-bottom">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-7086938365759492"
       data-ad-slot="3333333333"

</footer>

<!-- ADSENSE INIT (FIX CLAVE) -->
<script>
window.addEventListener("load", () => {
  document.querySelectorAll(".adsbygoogle").forEach(ad => {
    if (ad.offsetWidth > 0) {
      try {
        (adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        console.error("Adsense error:", e);
      }
    }
  });
});
</script>

</html>
