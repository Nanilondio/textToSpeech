<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-adsense-account" content="ca-pub-7086938365759492">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free English Text to Speech</title>

<!-- Adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7086938365759492" crossorigin="anonymous"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0d1117;
  color:white;
}

header {
  padding:20px;
  border-bottom:1px solid #333;
}

.ad-banner, .ad-bottom {
  text-align:center;
  padding:10px;
}

.layout {
  display:grid;
  grid-template-columns: 1fr 300px;
  gap:20px;
  padding:20px;
}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
}

.ad-sidebar {
  text-align:center;
}

/* Evita colapso de ancho */
.adsbygoogle {
  min-height: 90px;
}
</style>
</head>

<body>

<header>
  <h2>English Audio Generator</h2>
</header>

<!-- TOP AD -->
<div class="ad-banner">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-7086938365759492"
       data-ad-slot="1111111111"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<main class="layout">

  <div>
    <h1>Text to Speech</h1>
    <textarea style="width:100%;height:150px;">
Hello world example text
    </textarea>
  </div>

  <!-- SIDEBAR AD -->
  <div class="ad-sidebar">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-7086938365759492"
         data-ad-slot="2222222222"
         data-ad-format="rectangle"></ins>
  </div>

</main>

<!-- BOTTOM AD -->
<div class="ad-bottom">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-7086938365759492"
       data-ad-slot="3333333333"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<footer style="text-align:center;padding:20px;border-top:1px solid #333;">
  © 2026
</footer>

<!-- ADSENSE INIT CORRECTO -->
<script>
window.addEventListener("load", () => {
  const ads = document.querySelectorAll(".adsbygoogle");

  ads.forEach((ad, index) => {
    setTimeout(() => {
      const width = ad.offsetWidth;

      if (width > 0) {
        try {
          (adsbygoogle = window.adsbygoogle || []).push({});
        } catch (e) {
          console.error("Adsense error:", e);
        }
      } else {
        console.warn("Ad skipped (width 0):", index);
      }
    }, index * 400); // evita conflictos
  });
});
</script>

</body>
</html>
